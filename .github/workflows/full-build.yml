## Auto-generated code, please to not edit!

name: Full Build

on:
  # 1️⃣ Run on push / PR to main branch or tag v*.*.*, the latter will trigger release
  push:
    branches: [ "cs-main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "cs-main" ]

  # 2️⃣ Manual trigger (UI + API)
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Upstream repository"
        required: false
      source_branch:
        description: "Upstream branch"
        required: false
      source_commit:
        description: "Upstream commit"
        required: false

  # 3️⃣ Scheduled (weekly)
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC

permissions:
  contents: write

# 🔒 Prevent duplicate / overlapping runs
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # keep it false, early exit mechanism + debounce will prevent multiple builds

jobs:
  windows-build-info:
    name: Check Clang and System Info Windows
    runs-on: windows-latest
    steps:
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show OS and compiler info
        shell: pwsh
        run: |
          Write-Host "=== OS Information ==="
          systeminfo | Select-String "OS Name","OS Version"

          Write-Host ""
          Write-Host "=== Visual Studio Installation ==="
          if (Get-Command vswhere -ErrorAction SilentlyContinue) {
            vswhere -latest -products * `
              -property installationPath
          } else {
            Write-Host "vswhere not found"
          }

          Write-Host ""
          Write-Host "=== MSVC Compiler (cl.exe) ==="
          if (Get-Command cl.exe -ErrorAction SilentlyContinue) {
            cl
          } else {
            Write-Host "cl.exe not found"
          }

          Write-Host ""
          Write-Host "=== Clang (clang-cl) ==="
          if (Get-Command clang-cl -ErrorAction SilentlyContinue) {
            clang-cl --version
          } else {
            Write-Host "clang-cl not found"
          }

  linux-build-info:
    name: Check Clang and System Info Linux
    runs-on: ubuntu-latest

    steps:
      - name: Show OS and compiler info
        run: |
          echo "=== OS Information ==="
          cat /etc/os-release || true
          echo ""
          echo "=== Clang Version ==="
          clang++ --version || echo "clang++ not found"
          echo ""
          echo "=== GCC Version (if installed) ==="
          gcc --version || echo "gcc not found"
          echo ""
          echo "=== CMake Version (if installed) ==="
          cmake --version || echo "cmake not found"
          echo ""
          echo "=== Ninja Version (if installed) ==="
          ninja --version || echo "ninja not found"

  trigger-info:
    name: Trigger info
    runs-on: ubuntu-latest

    steps:
      - name: Detect trigger
        id: trigger
        run: |
          echo "event_name=${{ github.event_name }}" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "trigger=scheduled" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "trigger=manual-or-api" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "trigger=pull-request" >> $GITHUB_OUTPUT
          else
            echo "trigger=push" >> $GITHUB_OUTPUT
          fi

      - name: Print trigger info
        run: |
          echo "Event name : ${{ github.event_name }}"
          echo "Trigger    : ${{ steps.trigger.outputs.trigger }}"
          echo "Ref        : ${{ github.ref }}"
          echo "SHA        : ${{ github.sha }}"
          echo "Source repo:    ${{ github.event.inputs.source_repo }}"
          echo "Source branch:  ${{ github.event.inputs.source_branch }}"
          echo "Source commit:  ${{ github.event.inputs.source_commit }}"

  guard:
    name: Early-Exit Guard
    runs-on: ubuntu-latest

    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}

    steps:
      # checkout myself
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # checkout other deps

      - name: checkout csProjectManager
        uses: actions/checkout@v4
        with:
          repository: cscosine/csProjectManager.git
          path: csProjectManager
          ref: cs-main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: checkout csCMake
        uses: actions/checkout@v4
        with:
          repository: cscosine/csCMake.git
          path: csCMake
          ref: cs-main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: checkout csCore
        uses: actions/checkout@v4
        with:
          repository: cscosine/csCore.git
          path: csCore
          ref: cs-main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: checkout csLie
        uses: actions/checkout@v4
        with:
          repository: cscosine/csLie.git
          path: csLie
          ref: cs-main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: checkout csCamera
        uses: actions/checkout@v4
        with:
          repository: cscosine/csCamera.git
          path: csCamera
          ref: cs-main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      - name: checkout csVisOpenGL
        uses: actions/checkout@v4
        with:
          repository: cscosine/csVisOpenGL.git
          path: csVisOpenGL
          ref: cs-main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_ORG_ACCESS }}

      # ---------------------------------------------------
      # Compute current SHAs
      - name: Compute current SHAs
        id: shas
        run: |
          echo "csBaseLibs=$(git rev-parse HEAD)" >> shas.txt
          # all other deps...
          echo "cscosine/csProjectManager.git=$(git -C csProjectManager rev-parse HEAD)" >> shas.txt
          echo "cscosine/csCMake.git=$(git -C csCMake rev-parse HEAD)" >> shas.txt
          echo "cscosine/csCore.git=$(git -C csCore rev-parse HEAD)" >> shas.txt
          echo "cscosine/csLie.git=$(git -C csLie rev-parse HEAD)" >> shas.txt
          echo "cscosine/csCamera.git=$(git -C csCamera rev-parse HEAD)" >> shas.txt
          echo "cscosine/csVisOpenGL.git=$(git -C csVisOpenGL rev-parse HEAD)" >> shas.txt

          cat shas.txt

      # ---------------------------------------------------
      # Restore previous SHAs from cache (cheap persistent store)
      - name: Restore previous SHAs
        id: cache
        uses: actions/cache@v4
        with:
          path: shas-prev.txt
          key: deps-sha-${{ github.ref_name }}
          restore-keys: |
            deps-sha-

      # ---------------------------------------------------
      # Decide whether to build
      - name: Decide whether to build
        id: decision
        run: |
          # Always build on tag
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "💡 Trigger is a tag, will build"
            exit 0
          fi

          if [ ! -f shas-prev.txt ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "💡 No previous SHAs found → will build"
            exit 0
          fi

          if cmp -s shas.txt shas-prev.txt; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "💤 SHAs unchanged → skipping build"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "💡 SHAs changed → will build"
          fi

      # ---------------------------------------------------
      # Save current SHAs for next run
      - name: Prepare SHAs for cache
        run: cp shas.txt shas-prev.txt

      - name: Save current SHAs to cache
        if: steps.decision.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: shas-prev.txt
          key: deps-sha-${{ github.ref_name }}

      # ---------------------------------------------------
      # 🔹 Show nice summary in Actions UI
      - name: Early-Exit Summary
        run: |
          echo "### 🔹 Early-Exit Guard Summary"
          echo ""
          echo "Trigger type : ${GITHUB_EVENT_NAME}"
          echo "Ref          : ${GITHUB_REF}"
          echo "Current SHAs :"
          cat shas.txt
          echo ""
          if [ "${{ steps.decision.outputs.should_build }}" == "true" ]; then
            echo "✅ Build will proceed"
          else
            echo "💤 Build skipped (early-exit)"
          fi

