      run: cmake --workflow linux-ninja-multi-config-clang
      working-directory: csVisOpenGL

    # ---------------------------------------------------

    # ---------------------------------------------------
    # zip installation section
    - name: Zip Installations linux-linux-ninja-multi-config-clang
      run: |
        if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
          VERSION=${GITHUB_REF_NAME}
        else
          VERSION=$(date +'%Y%m%d-%H%M%S')
        fi

        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Using VERSION=$VERSION"

        (
          cd install/linux-ninja-multi-config-clang/
          zip -r "$GITHUB_WORKSPACE/bundle-csBaseLibs-${VERSION}-csCore-linux-linux-ninja-multi-config-clang.zip" csCore
        )
        (
          cd install/linux-ninja-multi-config-clang/
          zip -r "$GITHUB_WORKSPACE/bundle-csBaseLibs-${VERSION}-csLie-linux-linux-ninja-multi-config-clang.zip" csLie
        )
        (
          cd install/linux-ninja-multi-config-clang/
          zip -r "$GITHUB_WORKSPACE/bundle-csBaseLibs-${VERSION}-csCamera-linux-linux-ninja-multi-config-clang.zip" csCamera
        )
        (
          cd install/linux-ninja-multi-config-clang/
          zip -r "$GITHUB_WORKSPACE/bundle-csBaseLibs-${VERSION}-csVisOpenGL-linux-linux-ninja-multi-config-clang.zip" csVisOpenGL
        )
      shell: bash
    # ---------------------------------------------------

    # ---------------------------------------------------
    # prepare artifacts section
