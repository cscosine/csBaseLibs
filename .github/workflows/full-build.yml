    - name: Upload Installation Artifacts windows-msvc2022-x64
      uses: actions/upload-artifact@v4
      with:
        name: windows-msvc2022-x64
        if-no-files-found: error
        path: |
          bundle-csBaseLibs-${{ env.VERSION }}-csCore-windows-msvc2022-x64.zip
          bundle-csBaseLibs-${{ env.VERSION }}-csLie-windows-msvc2022-x64.zip
          bundle-csBaseLibs-${{ env.VERSION }}-csCamera-windows-msvc2022-x64.zip
