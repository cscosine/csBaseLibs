          bundle-csBaseLibs-${{ env.VERSION }}-csCamera-linux-linux-ninja-multi-config-clang.zip
          bundle-csBaseLibs-${{ env.VERSION }}-csVisOpenGL-linux-linux-ninja-multi-config-clang.zip
