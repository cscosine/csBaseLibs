      run: cmake --workflow msvc2022-x64-LLVM
      working-directory: csCore

    - name: Build windows-msvc2022-x64-LLVM-csLie (1 / 1)
      run: cmake --workflow msvc2022-x64-LLVM
      working-directory: csLie

