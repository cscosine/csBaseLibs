    - name: Setup CMake
      uses: lukka/get-cmake@latest

    # ---------------------------------------------------

    # ---------------------------------------------------
    # build section
    - name: Build windows-msvc2022-x64-csCore (1 / 1)
      run: cmake --workflow msvc2022-x64
      working-directory: csCore

    - name: Build windows-msvc2022-x64-csLie (1 / 1)
      run: cmake --workflow msvc2022-x64
      working-directory: csLie

    - name: Build windows-msvc2022-x64-csCamera (1 / 1)
      run: cmake --workflow msvc2022-x64
      working-directory: csCamera

    - name: Build windows-msvc2022-x64-csVisOpenGL (1 / 1)
      run: cmake --workflow msvc2022-x64
      working-directory: csVisOpenGL

    # ---------------------------------------------------

    # ---------------------------------------------------
    # zip installation section
    - name: Zip Installations windows-msvc2022-x64
      shell: pwsh
      run: |
        if ($env:GITHUB_REF_TYPE -eq "tag") {
          $VERSION = $env:GITHUB_REF_NAME
        } else {
          $VERSION = Get-Date -Format "yyyyMMdd-HHmmss"
        }

        "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "Using VERSION=$VERSION",

        # zip csCore
        $src = "install\msvc2022-x64\csCore"
        $dst = "$env:GITHUB_WORKSPACE\bundle-csBaseLibs-$VERSION-csCore-windows-msvc2022-x64.zip"

